<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test</title>
    <style>
      * {
        font-family: 微軟正黑體 Arial, Helvetica, sans-serif;
      }
      .downloadImage {
        display: flex;
        flex-wrap: wrap;
      }
      .downloadImage > div {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 300px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin: 10px;
        padding: 10px;
        position: relative;
      }
      img {
        position: relative;
        width: 100%;
      }
      input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        margin: 10px 0;
        width: 500px;
      }
      a,
      .btn {
        padding: 10px 15px;
        text-decoration: none;
        color: #aaf;
        font-weight: bold;
        border: 1px solid #ddd;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <h1>輸入/貼入網址</h1>
    <input type="text" name="imageUrl" id="imageUrl" />
    <button class="btn">送出</button>
    <hr />
    <h1>圖片下載區　按住alt即可下載圖檔</h1>
    <div class="downloadImage"></div>
    <script src="./script.js"></script>
  </body>
</html>
